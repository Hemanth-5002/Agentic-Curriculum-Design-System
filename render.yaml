services:
  # Backend FastAPI Service
  - type: web
    name: curriculum-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://curriculum-frontend.onrender.com" # Placeholder, update after frontend is created

  # Frontend Static Site
  - type: web
    name: curriculum-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://curriculum-backend.onrender.com"
